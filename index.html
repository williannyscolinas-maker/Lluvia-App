<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lluvia App</title>
    <style>
        /* 1. Limpiamos márgenes para que ocupe todo el teléfono sin bordes */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #161c28; /* Color de tu menú */
        }

        /* 2. Contenedor que ocupa el 100% de la pantalla, sin medidas raras */
        .contenedor {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* 3. Tu app de Hércules a pantalla completa normal */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block; /* Evita pequeños espacios en blanco debajo del iframe */
        }

        /* 4. EL BLOQUE MAGICO: 
           Como dejaste 50px en Hércules, este bloque mide exactamente 50px.
           Tapará el logo, pero no tocará tus botones porque tú ya los subiste. */
        .bloque-tapa-logo {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50px; 
            background-color: #161c28; /* El gris oscuro de tu barra inferior */
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <iframe src="https://lluviaapp01.onhercules.app/"></iframe>
        
        <div class="bloque-tapa-logo"></div>
    </div>

</body>
</html>
